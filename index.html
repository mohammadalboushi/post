<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Al-Boushi</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

    <style>
        :root {
            --bg: #f7f6f2;
            --surface: #ffffff;
            --surface-alt: #f0ede8;
            --ink: #1a1714;
            --ink-muted: #7a756e;
            --ink-faint: #c4bfb8;
            --accent: #e8501a;
            --accent-light: #fef0eb;
            --accent-muted: #f5c4b2;
            --pinned: #1a6beb;
            --pinned-light: #eaf1fd;
            --border: rgba(0,0,0,0.07);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.06), 0 12px 32px rgba(0,0,0,0.06);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.08), 0 24px 64px rgba(0,0,0,0.1);
            --radius: 18px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- Dark Mode Variables --- */
        [data-theme="dark"] {
            --bg: #121212;
            --surface: #1e1e1e;
            --surface-alt: #2a2a2a;
            --ink: #f0ede8;
            --ink-muted: #a09c96;
            --ink-faint: #6b6863;
            --accent: #ff6b35;
            --accent-light: rgba(255, 107, 53, 0.1);
            --accent-muted: #8a3c22;
            --pinned: #4dabf5;
            --pinned-light: rgba(77, 171, 245, 0.1);
            --border: rgba(255, 255, 255, 0.08);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.5);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.6);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color var(--transition), color var(--transition);
        }

        body.modal-open {
            overflow: hidden; 
        }

        /* خلفية شبكية خفيفة جداً بديلة للـ SVG المعقد لتسريع الموقع */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 9999;
        }
        [data-theme="dark"] body::before {
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 clamp(16px, 5vw, 80px);
            background: var(--bg); 
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
            transition: background var(--transition), border-color var(--transition);
        }
        
        [data-theme="dark"] header { background: rgba(18, 18, 18, 0.85); }
        :not([data-theme="dark"]) header { background: rgba(247, 246, 242, 0.85); }

        .header-inner {
            max-width: 820px;
            margin: 0 auto;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .wordmark {
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: system-ui, sans-serif;
            text-decoration: none;
            cursor: pointer;
        }

        .brand-m { color: var(--accent); }

        .wordmark-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.7; }
        }

        .header-controls { display: flex; align-items: center; gap: 12px; }

        .icon-btn {
            background: var(--surface-alt);
            color: var(--ink-muted);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }
        
        .icon-btn:hover {
            background: var(--surface);
            color: var(--accent);
            box-shadow: var(--shadow-sm);
            transform: translateY(-2px);
        }

        .post-count-badge {
            font-size: 0.75rem;
            color: var(--ink-muted);
            background: var(--surface-alt);
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 600;
            transition: var(--transition);
        }

        /* ==================== HEADER LIVE BUTTON ==================== */
        .header-live-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }
        .header-live-btn:hover { background: rgba(239, 68, 68, 0.2); }
        .header-live-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        
        .live-pulse-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.8);
            animation: pulse-live 1.5s infinite;
        }

        @keyframes pulse-live {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* ==================== AUDIO EQUALIZER ANIMATION ==================== */
        .music-bg-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            contain: strict;
            opacity: 0.15; /* شفافية ناعمة جداً مريحة للعين */
        }
        .eq-bar {
            width: 16px;
            border-radius: 50px;
            background-color: var(--accent); /* شلنا التدرج اللوني المعقد */
            opacity: 0.7;
            will-change: transform;
            transform-origin: bottom; /* خليناها تنبض من تحت لفوق أزبط */
            animation: eq-bounce 1s infinite ease-in-out alternate;
            transform: translateZ(0); /* تسريع هاردوير */
        }
        /* أطوال وسرعات مختلفة لكل عمود ليعطي شكل واقعي */
        .eq-bar.b1 { height: 100px; animation-duration: 0.6s; }
        .eq-bar.b2 { height: 180px; animation-duration: 0.9s; }
        .eq-bar.b3 { height: 260px; animation-duration: 0.7s; }
        .eq-bar.b4 { height: 320px; animation-duration: 1.1s; }
        .eq-bar.b5 { height: 240px; animation-duration: 0.8s; }
        .eq-bar.b6 { height: 160px; animation-duration: 1.0s; }
        .eq-bar.b7 { height: 120px; animation-duration: 0.75s; }

        [data-theme="dark"] .music-bg-container { opacity: 0.1; }

        @keyframes eq-bounce {
            0% { transform: scaleY(0.2); }
            100% { transform: scaleY(1); }
        }
        @keyframes spinGlobe {
            from { background-position: 0 center; }
            to { background-position: -200% center; }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .live-interaction-box {
            background: var(--surface);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        @media (min-width: 600px) {
            .live-interaction-box {
                max-width: 500px;
                height: 85vh;
                border-radius: 24px;
                overflow: hidden;
                box-shadow: var(--shadow-lg);
                border: 1px solid var(--border);
            }
        }

        .live-modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface-alt);
        }

        .btn-close-modal {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: none;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }
        .btn-close-modal:hover { background: #ef4444; color: #fff; }

        /* Chat Area */
        .chat-list { 
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; 
            display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; padding-right: 5px; 
            scroll-behavior: smooth; 
            will-change: transform; transform: translateZ(0); 
        }
        .chat-bubble { 
            background: rgba(255, 255, 255, 0.85); /* شفافية لونية بدون غباش */
            border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 10px 14px; border-radius: 18px; border-top-right-radius: 4px;
            width: fit-content; max-width: 85%; align-self: flex-start;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex; flex-direction: column;
        }
        [data-theme="dark"] .chat-bubble { background: rgba(42, 42, 42, 0.85); border-color: rgba(255, 255, 255, 0.05); }
        .chat-bubble.mine { 
            background: rgba(232, 80, 26, 0.15); border-color: rgba(232, 80, 26, 0.1);
            border-top-right-radius: 18px; border-top-left-radius: 4px; align-self: flex-end;
        }
        [data-theme="dark"] .chat-bubble.mine { background: rgba(232, 80, 26, 0.2); }
        .chat-bubble.system-bubble {
            background: transparent; border: 1px dashed var(--border);
            box-shadow: none; padding: 6px 12px;
        }
        
        .chat-sender { font-size: 0.75rem; font-weight: 900; color: var(--accent); margin-bottom: 4px; }
        .chat-text { 
            font-size: 0.9rem; color: var(--ink); font-weight: 700; line-height: 1.5; word-wrap: break-word; 
            max-height: 120px; /* تقييد النص الطويل */
            overflow-y: auto; /* إضافة سكرول إذا كان النص طويل جداً */
        }
        .chat-text::-webkit-scrollbar { width: 3px; }
        .chat-text::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        
        .chat-input-row { display: flex; gap: 10px; border-top: 1px solid var(--border); padding-top: 15px; flex-shrink: 0; }
        .chat-input { flex: 1; padding: 14px 20px; border-radius: 50px; border: 1px solid var(--border); background: var(--bg); color: var(--ink); font-family: inherit; font-size: 1rem; outline: none; }
        .chat-input:focus { border-color: var(--accent); }
        .chat-send-btn { background: var(--accent); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }

        .floating-mic-btn {
            position: absolute;
            bottom: 95px; /* رفعناه لفوق لتصير المساحة أريح */
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--surface-alt);
            color: var(--ink-muted);
            border: 2px solid var(--border);
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        /* Post Items (Main Page) */
        .hero {
            padding: clamp(40px, 8vw, 80px) clamp(16px, 5vw, 80px) clamp(20px, 4vw, 40px);
            max-width: 820px;
            margin: 0 auto;
            animation: fade-up 0.6s ease both;
        }

        @keyframes fade-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .hero h1 { font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 900; line-height: 1.1; letter-spacing: -0.03em; color: var(--ink); transition: color var(--transition); }
        .hero h1 em { font-style: normal; color: var(--accent); position: relative; }
        .hero-sub { margin-top: 16px; font-size: 1rem; color: var(--ink-muted); font-weight: 400; line-height: 1.6; }

        .search-container { margin: 25px auto 0; max-width: 600px; position: relative; }
        .search-input {
            width: 100%; padding: 14px 45px 14px 20px; border-radius: 50px;
            border: 1px solid var(--border); background: var(--surface); color: var(--ink);
            font-family: inherit; font-size: 1rem; box-shadow: var(--shadow-sm);
            outline: none; transition: var(--transition);
        }
        .search-input:focus { border-color: var(--accent); box-shadow: var(--shadow-md); }
        .search-icon { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--ink-muted); }

        #posts-container {
            max-width: 820px; margin: 0 auto; padding: 0 clamp(16px, 5vw, 80px) 80px;
            display: flex; flex-direction: column; gap: 16px;
        }

        .post-card {
            background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
            box-shadow: var(--shadow-sm); overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background-color var(--transition), border-color var(--transition);
            animation: card-in 0.5s ease both;
        }

        @keyframes card-in { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        .card-body { padding: 24px 28px 20px; }
        .post-title { font-size: 1.15rem; font-weight: 900; color: var(--ink); line-height: 1.35; letter-spacing: -0.02em; margin-bottom: 12px; transition: color var(--transition); }
        .post-image { width: 100%; height: auto; max-height: 700px; object-fit: contain; border-radius: var(--radius-sm); margin-bottom: 16px; border: 1px solid var(--border); background: transparent; }
        .post-content { font-size: 0.97rem; line-height: 1.85; color: var(--ink); opacity: 0.9; white-space: pre-wrap; word-break: break-word; transition: color var(--transition); }

        .loading-feed { display: flex; flex-direction: column; gap: 16px; }
        .skeleton-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 28px; animation: skeleton-pulse 1.5s ease-in-out infinite; }
        .skeleton-line { background: var(--surface-alt); border-radius: 6px; height: 14px; margin-bottom: 12px; }
        @keyframes skeleton-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        #toast {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--ink); color: var(--surface); padding: 12px 22px; border-radius: 50px;
            font-size: 0.85rem; font-weight: 700; font-family: 'Cairo', sans-serif;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2); z-index: 99999; opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease; pointer-events: none;
            display: flex; align-items: center; gap: 8px; white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast .toast-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; }

        .fade-anim { animation: fade 2s infinite alternate; }
        @keyframes fade { 0% {opacity:0.5;} 100% {opacity:1;} }
        
        .modal-box-viewers {
            background: var(--surface); padding: 20px; border-radius: 20px;
            width: 90%; max-width: 350px; box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <a onclick="window.goHome(event)" class="wordmark">
                <div class="wordmark-dot"></div>
                <span dir="ltr"><span class="brand-m">M-</span>Al-Boushi</span>
            </a>
            
            <div class="header-controls">
                <div id="headerLiveControls" style="display: none; align-items: center; gap: 8px;">
                    <button id="btnHeaderJoin" class="header-live-btn" onclick="joinBroadcast()">
                        <span class="live-pulse-dot"></span> مباشر
                    </button>
                    <div id="headerListeningControls" style="display: none; align-items: center; gap: 6px;">
                        <button class="header-live-btn active" onclick="openLiveInteraction()">
                            <i class="fas fa-comments"></i> تفاعل
                        </button>
                        <button class="icon-btn" style="color: #ef4444; background: rgba(239,68,68,0.1); width: 32px; height: 32px;" onclick="promptLeaveBroadcast()" title="خروج من البث">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>

                <button id="themeToggleBtn" class="icon-btn" title="الوضع الليلي/النهاري" onclick="toggleTheme()">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="post-count-badge" id="postCountBadge">جاري التحميل...</div>
            </div>
        </div>
    </header>

    <div class="hero" id="heroSection">
        <div class="hero-label"><i class="fas fa-bolt" style="font-size:0.7rem;"></i> آخر المنشورات</div>
        <h1>الأخبار<br><em>والمقالات</em></h1>
        <p class="hero-sub">كل ما يستحق القراءة، في مكان واحد.</p>
        
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن كلمة بالمنشورات...">
        </div>
    </div>

    <div id="posts-container">
        <div class="loading-feed" id="feedContainer">
            <div class="skeleton-card">
                <div class="skeleton-line" style="width:30%; height:10px; margin-bottom:20px;"></div>
                <div class="skeleton-line" style="width:70%; height:18px;"></div>
                <div class="skeleton-line" style="width:55%; height:18px;"></div>
                <div class="skeleton-line" style="width:90%; height:12px; margin-top:8px;"></div>
                <div class="skeleton-line" style="width:75%; height:12px;"></div>
            </div>
        </div>
    </div>

    <div id="liveInteractionModal" class="modal-overlay">
        <div class="live-interaction-box">
            
            <div class="live-modal-header" style="display:flex; flex-direction:column; gap:5px; padding: 10px 15px; flex-shrink: 0;">
                <div style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <h3 style="font-size: 0.95rem; font-weight: 900; color: var(--ink); margin: 0; display: flex; align-items: center; gap: 6px;" id="liveRoomTitle">
                            <i class="fas fa-broadcast-tower" style="color: var(--danger);"></i> أبو فايز
                        </h3>
                        <button id="floatingMicBtn" onclick="handleVisitorMicClick()" style="background: var(--surface-alt); color: var(--ink-muted); border: 1px solid var(--border); padding: 4px 10px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 4px;">
                            <i class="fas fa-microphone"></i> <span>طلب المايك</span>
                        </button>
                    </div>
                    <div style="display:flex; align-items:center; gap: 10px;">
                        <span id="visitorTimer" style="font-weight: 900; font-family: monospace; font-size: 0.9rem; color: var(--ink);">00:00</span>
                        <div style="color: var(--accent); font-weight: bold; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 4px;" onclick="openVisitorViewersList()">
                            <i class="fas fa-users"></i> <span id="visitorViewersCount">0</span>
                        </div>
                        <button class="btn-close-modal" onclick="promptLeaveBroadcast()" style="padding: 4px 10px;"><i class="fas fa-times"></i></button>
                    </div>
                </div>
                <canvas id="visitorVisualizer" style="width: 100%; height: 12px;"></canvas>
            </div>

            <div id="visitorMediaContainer" style="display: none; width: 100%; background: #000; border-bottom: 1px solid var(--border); pointer-events: none;">
                <div id="ytVisitorPlayer" style="width: 100%; height: 220px; display: none;"></div>
                <div id="ytVisitorAudio" style="width: 100%; height: 80px; display: none; align-items: center; justify-content: center; color: var(--accent); font-size: 2rem;">
                    <i class="fas fa-music fade-anim"></i>
                </div>
            </div>

            <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; padding: 15px; position: relative; background: var(--surface);">
                
                <div class="music-bg-container">
                    <div class="eq-bar b1"></div>
                    <div class="eq-bar b2"></div>
                    <div class="eq-bar b3"></div>
                    <div class="eq-bar b4"></div>
                    <div class="eq-bar b5"></div>
                    <div class="eq-bar b6"></div>
                    <div class="eq-bar b7"></div>
                </div>

                <div class="chat-list" id="chatList" style="position: relative; z-index: 2;"></div>
                
                <div class="chat-input-row" style="position: relative; z-index: 2; border-top: none;">
                    <input type="text" id="chatMsgInput" class="chat-input" placeholder="اكتب رسالتك..." style="box-shadow: 0 -4px 20px rgba(0,0,0,0.03);">
                    <button class="chat-send-btn" onclick="sendChatMsg()"><i class="fas fa-paper-plane"></i></button>
                </div>
                
            </div>

        </div>
    </div>

    <div id="visitorViewersModal" class="modal-overlay" style="z-index: 10000;">
        <div class="modal-box-viewers">
            <h3 style="text-align: center; margin-bottom: 20px; font-weight: 900; color: var(--ink);"><i class="fas fa-users"></i> المشاهدين الآن</h3>
            <div id="visitorViewersList" style="max-height: 250px; overflow-y: auto; color: var(--ink);"></div>
            <button style="width: 100%; margin-top: 15px; padding: 10px; border-radius: 10px; border: none; background: var(--surface-alt); color: var(--ink); font-weight: bold; cursor: pointer;" onclick="document.getElementById('visitorViewersModal').style.display='none'">إغلاق</button>
        </div>
    </div>

    <div id="leaveConfirmModal" class="modal-overlay" style="z-index: 10001;">
        <div class="modal-box-viewers" style="text-align: center; max-width: 320px;">
            <div style="font-size: 3.5rem; color: #ef4444; margin-bottom: 15px;"><i class="fas fa-sign-out-alt"></i></div>
            <h3 style="margin-bottom: 10px; font-weight: 900; color: var(--ink);">بدك تطلع من البث؟</h3>
            <p style="color: var(--ink-muted); font-size: 0.9rem; margin-bottom: 25px; line-height: 1.6;">إذا طلعت رح يوقف الصوت عندك، بس فيك ترجع إيمتى ما بدك بضغطة وحدة.</p>
            <div style="display: flex; gap: 10px;">
                <button class="btn-live" style="flex:1; justify-content:center; background: #ef4444; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);" onclick="confirmLeaveBroadcast()">خروج</button>
                <button class="btn-interact" style="flex:1; justify-content:center;" onclick="document.getElementById('leaveConfirmModal').style.display='none'">بقاء</button>
            </div>
        </div>
    </div>

    <div id="micCancelConfirmModal" class="modal-overlay" style="z-index: 10001;">
        <div class="modal-box-viewers" style="text-align: center; max-width: 320px;">
            <div style="font-size: 3.5rem; color: var(--warning); margin-bottom: 15px;"><i class="fas fa-microphone-slash"></i></div>
            <h3 style="margin-bottom: 10px; font-weight: 900; color: var(--ink);">بدك تتخلى عن المايك؟</h3>
            <p style="color: var(--ink-muted); font-size: 0.9rem; margin-bottom: 25px; line-height: 1.6;">إذا أكدت، رح يتم إلغاء طلبك للحديث وتقدر ترجع تسمع بس.</p>
            <div style="display: flex; gap: 10px;">
                <button class="btn-live" style="flex:1; justify-content:center; background: var(--warning); color: #000; box-shadow: 0 4px 12px rgba(251, 191, 36, 0.3);" onclick="confirmMicCancel()">إلغاء الطلب</button>
                <button class="btn-interact" style="flex:1; justify-content:center;" onclick="document.getElementById('micCancelConfirmModal').style.display='none'">تراجع</button>
            </div>
        </div>
    </div>

    <div id="toast"><span class="toast-dot"></span> <span id="toast-msg"></span></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const app = initializeApp({ apiKey: "AIzaSyBB_U4C880PW4GxZd8FALv8yBSiP2mNeBY", authDomain: "malaboushi.firebaseapp.com", databaseURL: "https://malaboushi-default-rtdb.firebaseio.com/", projectId: "malaboushi", storageBucket: "malaboushi.firebasestorage.app" });
        const db = getDatabase(app);
        
        window.showToast = msg => { document.getElementById('toast-msg').innerText = msg; document.getElementById('toast').classList.add('show'); setTimeout(()=>document.getElementById('toast').classList.remove('show'), 3000); };
        window.toggleTheme = () => {
            if (document.body.getAttribute('data-theme') === 'dark') {
                document.body.removeAttribute('data-theme');
            } else {
                document.body.setAttribute('data-theme', 'dark');
            }
        };

        let isAudioPlaying = false;
        document.addEventListener('play', e => { if(e.target.tagName === 'AUDIO') isAudioPlaying = true; }, true);
        document.addEventListener('pause', e => { if(e.target.tagName === 'AUDIO') isAudioPlaying = false; }, true);
        document.addEventListener('ended', e => { if(e.target.tagName === 'AUDIO') { isAudioPlaying = false; renderPosts(document.getElementById('searchInput').value); } }, true);

        let allFetchedPosts = [];
        onValue(ref(db, 'posts'), snap => {
            const data = snap.val();
            if(data) allFetchedPosts = Object.entries(data).map(([k,v])=>({id:k,...v})).sort((a,b)=>(a.order||0)-(b.order||0));
            renderPosts(document.getElementById('searchInput').value);
        });

        document.getElementById('searchInput').oninput = e => renderPosts(e.target.value);

        function renderPosts(query = '') {
            if (isAudioPlaying) return; 
            const container = document.getElementById('feedContainer'); container.innerHTML = '';
            let filtered = query ? allFetchedPosts.filter(p => (p.title||'').includes(query) || (p.content||'').includes(query)) : allFetchedPosts;
            
            const badge = document.getElementById('postCountBadge');
            if(badge) badge.innerText = filtered.length + ' منشور';
            
            filtered.forEach(post => {
                const card = document.createElement('div'); card.className = 'post-card';
                card.innerHTML = `
                    <div class="card-body">
                        <div style="font-size:0.8rem; color:var(--ink-muted); margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
                            <span>${new Date(post.timestamp).toLocaleDateString('ar-EG')}</span>
                            <div style="display:flex; gap:10px; align-items:center;">
                                ${post.audioUrl ? `<span style="color:var(--accent); font-weight:bold;"><i class="fas fa-play"></i> ${post.playCount || 0}</span>` : ''}
                                ${post.content ? `<button onclick="copyPostText('${post.id}')" style="background:var(--surface-alt); border:1px solid var(--border); color:var(--ink-muted); padding:6px 12px; border-radius:50px; font-family:inherit; font-weight:bold; cursor:pointer; font-size:0.75rem; transition:0.2s;"><i class="far fa-copy"></i> نسخ النص</button>` : ''}
                            </div>
                        </div>
                        ${post.title ? `<div class="post-title">${post.title}</div>` : ''}
                        ${post.imageUrl ? `<img src="${post.imageUrl}" class="post-image">` : ''}
                        ${post.audioUrl ? `<div onclick="event.stopPropagation()"><audio controls src="${post.audioUrl}" onplay="incrementPlayCount('${post.id}', event)" style="width:100%; outline:none; margin-bottom:15px;"></audio></div>` : ''}
                        <div class="post-content">${post.content}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.incrementPlayCount = (id, event) => {
            update(ref(db, `posts/${id}`), { playCount: (allFetchedPosts.find(p=>p.id===id).playCount || 0) + 1 });
            event.target.removeAttribute('onplay');
        };

        window.copyPostText = (id) => {
            const post = allFetchedPosts.find(p => p.id === id);
            if(post && post.content) {
                navigator.clipboard.writeText(post.content).then(() => {
                    showToast("تم نسخ النص بنجاح! 📋");
                }).catch(err => {
                    showToast("حدث خطأ أثناء النسخ");
                });
            }
        };

        // --- البث المباشر للزوار ---
        const AGORA_APP_ID = "7ca23eb56dfd45f7a89e9fd2a03a40ca";
        let rtcClient = null; let localMicTrack = null; let isListening = false;
        const visitorId = "user_" + Math.floor(Math.random() * 1000000);
        let visitorName = ""; 
        let visitorTimerInterval = null;
        let visitorAudioCtx = null;
        let visitorAnalyser = null;

        // مراقبة حالة البث (والتوقيت)
        onValue(ref(db, 'liveData/status'), snap => {
            const data = snap.val();
            document.getElementById('headerLiveControls').style.display = (data && data.isLive) ? 'flex' : 'none';
            if(!data || !data.isLive) {
                leaveBroadcast();
                clearInterval(visitorTimerInterval);
                document.getElementById('visitorTimer').innerText = "00:00";
            } else if (data.isLive && data.startedAt) {
                clearInterval(visitorTimerInterval);
                visitorTimerInterval = setInterval(() => {
                    let diff = Math.floor((Date.now() - data.startedAt) / 1000);
                    let m = Math.floor(diff / 60).toString().padStart(2, '0');
                    let s = (diff % 60).toString().padStart(2, '0');
                    document.getElementById('visitorTimer').innerText = `${m}:${s}`;
                }, 1000);
            }
        });

        // مراقبة الطرد الفوري من المدير
        onValue(ref(db, `liveData/kicked/${visitorId}`), snap => {
            if(snap.exists()) {
                leaveBroadcast();
                showToast("لقد تم إخراجك من البث من قبل المدير.");
                remove(ref(db, `liveData/kicked/${visitorId}`)); 
            }
        });

                        window.joinBroadcast = async () => {
            if (!visitorName) {
                const namePrompt = document.createElement('div');
                namePrompt.innerHTML = `
                    <style>
                        @keyframes popInModal {
                            0% { opacity: 0; transform: scale(0.85) translateY(20px); }
                            100% { opacity: 1; transform: scale(1) translateY(0); }
                        }
                        .modern-input:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 4px var(--accent-light) !important; }
                        .modern-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(232, 80, 26, 0.3) !important; filter: brightness(1.1); }
                        .modern-btn-secondary:hover { background: var(--border) !important; color: var(--ink) !important; }
                    </style>
                    <div class="modal-overlay" style="display:flex; z-index: 10000; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">
                        <div style="background: var(--surface); padding: 35px 25px; border-radius: 28px; width: 90%; max-width: 340px; text-align: center; box-shadow: 0 24px 60px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.4); border: 1px solid var(--border); animation: popInModal 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                            
                            <div style="width: 76px; height: 76px; background: linear-gradient(135deg, var(--accent-light), var(--surface-alt)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 10px 25px var(--accent-light), inset 0 2px 4px rgba(255,255,255,0.5);">
                                <i class="fas fa-headphones-alt" style="font-size: 2.2rem; color: var(--accent);"></i>
                            </div>
                            
                            <h3 style="margin-bottom: 8px; font-weight: 900; font-size: 1.4rem; color: var(--ink); letter-spacing: -0.02em;">مين معنا بالبث؟</h3>
                            <p style="color: var(--ink-muted); font-size: 0.88rem; margin-bottom: 24px; line-height: 1.6;">يا هلا فيك! اكتب اسمك لتشاركنا الدردشة والجو الحلو.</p>
                            
                            <div style="position: relative; margin-bottom: 24px;">
                                <i class="fas fa-user" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--ink-faint); font-size: 1rem;"></i>
                                <input type="text" id="tempNameInput" class="modern-input" placeholder="اسمك الكريم..." style="width: 100%; padding: 15px 42px 15px 15px; border-radius: 16px; border: 2px solid var(--border); background: var(--surface-alt); color: var(--ink); font-family: inherit; font-size: 1rem; font-weight: 700; outline: none; transition: 0.3s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">
                            </div>
                            
                            <div style="display: flex; gap: 12px;">
                                <button id="cancelNameBtn" class="modern-btn-secondary" style="flex: 1; padding: 14px; border-radius: 16px; border: none; background: var(--surface-alt); color: var(--ink-muted); font-family: inherit; font-weight: 800; font-size: 0.95rem; cursor: pointer; transition: 0.2s;">إلغاء</button>
                                <button id="confirmNameBtn" class="modern-btn-primary" style="flex: 1.5; padding: 14px; border-radius: 16px; border: none; background: var(--accent); color: white; font-family: inherit; font-weight: 800; font-size: 0.95rem; cursor: pointer; box-shadow: 0 8px 20px var(--accent-light); transition: 0.2s;">دخول للبث <i class="fas fa-arrow-left" style="margin-right: 6px; font-size: 0.85rem;"></i></button>
                            </div>
                        </div>
                    </div>
                `;

                document.body.appendChild(namePrompt);

                document.getElementById('cancelNameBtn').onclick = () => namePrompt.remove();
                document.getElementById('confirmNameBtn').onclick = () => {
                    const n = document.getElementById('tempNameInput').value.trim();
                    if(n) {
                        visitorName = n;
                        namePrompt.remove();
                        executeJoin();
                    } else {
                        showToast("اكتب اسمك يا غالي!");
                    }
                };
            } else {
                executeJoin();
            }
        };


        async function executeJoin() {
            try {
                if(!rtcClient) {
                    rtcClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
                    rtcClient.on("user-published", async (user, mediaType) => {
                        await rtcClient.subscribe(user, mediaType);
                        if (mediaType === "audio") {
                            user.audioTrack.play();
                            
                            try {
                                if(!visitorAudioCtx) visitorAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                                const stream = new MediaStream([user.audioTrack.getMediaStreamTrack()]);
                                const source = visitorAudioCtx.createMediaStreamSource(stream);
                                visitorAnalyser = visitorAudioCtx.createAnalyser();
                                visitorAnalyser.fftSize = 256;
                                source.connect(visitorAnalyser);
                                drawVisitorVisualizer();
                            } catch(e) { console.error("Visualizer Error:", e); }
                        }
                    });
                }
                await rtcClient.join(AGORA_APP_ID, "abu_fayez_radio", null, visitorId);
                isListening = true;
                
                const viewerRef = ref(db, 'liveData/viewers/' + visitorId);
                set(viewerRef, { name: visitorName, joinedAt: Date.now() });
                onDisconnect(viewerRef).remove();

                push(ref(db, 'liveData/chat'), {
                    senderId: 'system', name: 'النظام', text: `👋 انضم ${visitorName} للاستماع!`, timestamp: Date.now()
                });

                showToast("أنت الآن تستمع للبث 🎧");
                document.getElementById('btnHeaderJoin').style.display = 'none';
                document.getElementById('headerListeningControls').style.display = 'flex';
                
                // فتح نافذة الدردشة تلقائياً بمجرد إدخال الاسم
                openLiveInteraction();
                
                // تشغيل الميديا للزائر فقط بعد ما يضغط استماع
                if(typeof updateVisitorMedia === 'function') updateVisitorMedia();
                
            } catch (e) { showToast("خطأ بالاتصال"); }
        }

        // رسم التموجات الصوتية للزائر
        function drawVisitorVisualizer() {
            const canvas = document.getElementById("visitorVisualizer");
            if(!canvas) return;
            const ctx = canvas.getContext("2d");
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = 20;

            function draw() {
                if(!isListening) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    return;
                }
                requestAnimationFrame(draw);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if(visitorAnalyser) {
                    const dataArray = new Uint8Array(visitorAnalyser.frequencyBinCount);
                    visitorAnalyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                    let vol = sum / dataArray.length; 
                    
                    ctx.fillStyle = "var(--accent)";
                    let barWidth = Math.max(0, Math.min(canvas.width, vol * 2.5));
                    ctx.fillRect(canvas.width/2 - barWidth/2, 5, barWidth, 10);
                }
            }
            draw();
        }

        window.leaveBroadcast = () => {
            if(localMicTrack) { localMicTrack.close(); localMicTrack = null; }
            if(rtcClient) rtcClient.leave();
            isListening = false;
            document.getElementById('btnHeaderJoin').style.display = 'flex';
            document.getElementById('headerListeningControls').style.display = 'none';
            closeLiveInteraction();
            if(typeof updateVisitorMedia === 'function') updateVisitorMedia(); // إيقاف الميديا فوراً عند الخروج
            remove(ref(db, `liveData/requests/${visitorId}`)); remove(ref(db, `liveData/viewers/${visitorId}`));
        };

        // دالة إظهار بطاقة التأكيد
        window.promptLeaveBroadcast = () => {
            document.getElementById('leaveConfirmModal').style.display = 'flex';
        };

        // دالة تأكيد الخروج
        window.confirmLeaveBroadcast = () => {
            document.getElementById('leaveConfirmModal').style.display = 'none';
            leaveBroadcast(); // هاد بيكرش الزائر لبرى وبيرجع زر (استماع الآن)
        };

        window.openLiveInteraction = () => {
            document.getElementById('liveInteractionModal').style.display = 'flex';
            document.body.classList.add('modal-open');
        };

        window.closeLiveInteraction = () => {
            document.getElementById('liveInteractionModal').style.display = 'none';
            document.body.classList.remove('modal-open');
        };

        // مراقبة وإظهار عدد واسماء المشاهدين للزوار
        onValue(ref(db, 'liveData/viewers'), snap => {
            const data = snap.val();
            const countSpan = document.getElementById('visitorViewersCount');
            const vList = document.getElementById('visitorViewersList');
            if(countSpan) countSpan.innerText = data ? Object.keys(data).length : '0';
            if(vList) {
                vList.innerHTML = '';
                if(data) {
                    Object.values(data).forEach(v => {
                        vList.innerHTML += `<div style="padding: 10px; border-bottom: 1px solid var(--border); font-weight: bold;"><i class="fas fa-user-circle" style="color: var(--ink-faint); margin-left: 5px;"></i> ${v.name}</div>`;
                    });
                } else {
                    vList.innerHTML = '<div style="text-align:center; color: var(--ink-faint);">لا يوجد مشاهدين</div>';
                }
            }
        });

        window.openVisitorViewersList = () => {
            document.getElementById('visitorViewersModal').style.display = 'flex';
        };

        window.sendChatMsg = () => {
            const inputField = document.getElementById('chatMsgInput');
            const msg = inputField.value.trim(); if(!msg) return;
            push(ref(db, 'liveData/chat'), { senderId: visitorId, name: visitorName||"مجهول", text: msg, timestamp: Date.now() });
            inputField.value = '';
            inputField.focus(); // إبقاء الكيبورد مفتوح
        };

        onValue(ref(db, 'liveData/chat'), snap => {
            const list = document.getElementById('chatList'); list.innerHTML = '';
            const data = snap.val(); if(!data) return;
            Object.values(data).sort((a,b)=>a.timestamp-b.timestamp).forEach(m => {
                const isMe = m.senderId === visitorId;
                const isAdmin = m.senderId === 'admin';
                const isSystem = m.senderId === 'system';
                
                // رسائل النظام صارت على جنب ضمن بطاقة شفافة وأنيقة
                if(isSystem) {
                    list.innerHTML += `
                        <div class="chat-bubble system-bubble">
                            <span class="chat-sender" style="color: var(--ink-muted);"><i class="fas fa-info-circle"></i> النظام</span>
                            <span class="chat-text" style="color: var(--ink-muted); font-size: 0.8rem;">${m.text}</span>
                        </div>
                    `;
                    return;
                }

                list.innerHTML += `
                    <div class="chat-bubble ${isMe ? 'mine' : ''}">
                        <span class="chat-sender" style="${isAdmin ? 'color: var(--danger);' : ''}">${isAdmin ? '👑 ' : ''}${m.name}</span>
                        <span class="chat-text" style="${isAdmin ? 'color: var(--danger);' : ''}">${m.text}</span>
                    </div>
                `;
            });
            list.scrollTop = list.scrollHeight;
        });

        // زر المايك العائم (طلب التحدث) الذكي
        let micStatus = 'none'; 
        window.handleVisitorMicClick = () => {
            if(micStatus === 'none') {
                if(!visitorName) {
                    showToast("يرجى إدخال اسمك أولاً عبر زر الاستماع");
                    return;
                }
                set(ref(db, `liveData/requests/${visitorId}`), { name: visitorName, status: 'pending', timestamp: Date.now() });
                
                // إرسال رسالة للدردشة ليعرف الجميع
                push(ref(db, 'liveData/chat'), {
                    senderId: 'system', name: 'النظام', text: `🎤 ${visitorName} طلب الصعود للمايك!`, timestamp: Date.now()
                });
                
                showToast("تم إرسال طلب التحدث للمدير");
            } else if(micStatus === 'pending' || micStatus === 'approved') {
                // إظهار البطاقة الأنيقة بدل الرسالة البشعة
                document.getElementById('micCancelConfirmModal').style.display = 'flex';
            }
        };

        // دالة تأكيد إلغاء طلب المايك وإرسال الإشعار
        window.confirmMicCancel = () => {
            document.getElementById('micCancelConfirmModal').style.display = 'none';
            remove(ref(db, `liveData/requests/${visitorId}`));
            
            // إشعار الدردشة بإلغاء الطلب
            push(ref(db, 'liveData/chat'), {
                senderId: 'system', name: 'النظام', text: `❌ ${visitorName} تخلى عن المايك!`, timestamp: Date.now()
            });
            
            showToast("تم إلغاء طلب المايك");
        };

        onValue(ref(db, `liveData/requests/${visitorId}`), async snap => {
            const data = snap.val();
            const micBtn = document.getElementById('floatingMicBtn');
            if(!data) { 
                micStatus = 'none';
                if(micBtn) {
                    micBtn.style.background = 'var(--surface-alt)';
                    micBtn.style.color = 'var(--ink-muted)';
                    micBtn.style.borderColor = 'var(--border)';
                    micBtn.innerHTML = '<i class="fas fa-microphone"></i> <span>طلب المايك</span>';
                }
                if(localMicTrack){
                    localMicTrack.close(); localMicTrack=null; 
                    if(rtcClient) await rtcClient.unpublish(); 
                    showToast("تم إنهاء اتصال المايك الخاص بك");
                } 
                return; 
            }
            
            if(data.status === 'pending') {
                micStatus = 'pending';
                if(micBtn) {
                    micBtn.style.background = 'var(--warning)';
                    micBtn.style.color = '#000';
                    micBtn.style.borderColor = 'var(--warning)';
                    micBtn.innerHTML = '<i class="fas fa-hourglass-half"></i> <span>قيد الانتظار</span>';
                }
            } else if(data.status === 'approved') {
                micStatus = 'approved';
                if(micBtn) {
                    micBtn.style.background = 'var(--success)';
                    micBtn.style.color = '#fff';
                    micBtn.style.borderColor = 'var(--success)';
                    micBtn.innerHTML = '<i class="fas fa-microphone-alt"></i> <span>أنت عالهواء</span>';
                }
                if(!localMicTrack) {
                    showToast("أنت على الهواء الآن! 🎙️");
                    localMicTrack = await AgoraRTC.createMicrophoneAudioTrack({ AEC: false, ANS: false });
                    if(rtcClient) await rtcClient.publish([localMicTrack]);
                }
            }
        });
        
        // مشغل اليوتيوب والميديا الذكي للزوار
        const ytTag = document.createElement('script');
        ytTag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(ytTag, firstScriptTag);

        let ytPlayerVisitor;
        let isYtReady = false;

        window.onYouTubeIframeAPIReady = () => {
            isYtReady = true;
        };

        let currentMediaData = null;
        onValue(ref(db, 'liveData/media'), (snap) => {
            currentMediaData = snap.val();
            updateVisitorMedia();
        });

        window.updateVisitorMedia = () => {
            const data = currentMediaData;
            const container = document.getElementById('visitorMediaContainer');
            const ytPlayer = document.getElementById('ytVisitorPlayer');
            const ytAudio = document.getElementById('ytVisitorAudio');
            
            if (!data || !isListening) {
                if(container) container.style.display = 'none';
                if (ytPlayerVisitor && ytPlayerVisitor.stopVideo) ytPlayerVisitor.stopVideo();
                const localVid = document.getElementById('visitorLocalVideo');
                if(localVid) { localVid.pause(); localVid.remove(); }
                return;
            }

            if(container) {
                container.style.display = 'block';
                
                if (data.type === 'youtube') {
                    if (data.display === 'audio') {
                        ytPlayer.style.display = 'none';
                        ytAudio.style.display = 'flex';
                        ytAudio.style.height = '80px';
                        ytAudio.innerHTML = '<i class="fas fa-music fade-anim"></i>';
                    } else {
                        ytPlayer.style.display = 'block';
                        ytAudio.style.display = 'none';
                    }
                    
                    if (!ytPlayerVisitor && isYtReady) {
                        ytPlayerVisitor = new YT.Player('ytVisitorPlayer', {
                            height: '100%', width: '100%', videoId: data.url,
                            playerVars: { 'controls': 0, 'disablekb': 1, 'rel': 0, 'playsinline': 1 },
                            events: { 'onReady': (e) => syncVisitorPlayer(e.target, data) }
                        });
                    } else if (ytPlayerVisitor && ytPlayerVisitor.getVideoData) {
                        syncVisitorPlayer(ytPlayerVisitor, data);
                    }
                } else if (data.type === 'local') {
                    ytPlayer.style.display = 'none';
                    ytAudio.style.display = 'flex';
                    ytAudio.style.height = '220px'; // نكبر المساحة للصورة والفيديو
                    
                    if (data.display === 'image') {
                        ytAudio.innerHTML = `<img src="${data.url}" style="max-width:100%; max-height:220px; border-radius:10px; object-fit:contain;">`;
                    } else if (data.display === 'video') {
                        // الفيديو صامت عند الزائر لأن الصوت جاية من الأجورا بوضوح!
                        if(!document.getElementById('visitorLocalVideo')) {
                            ytAudio.innerHTML = `<video id="visitorLocalVideo" src="${data.url}" style="width:100%; max-height:220px; border-radius:10px; object-fit:contain;" muted playsinline></video>`;
                        }
                        const localVid = document.getElementById('visitorLocalVideo');
                        if (localVid.src !== data.url) localVid.src = data.url;
                        
                        if(data.state === 'playing') {
                            localVid.play().catch(e=>console.log(e));
                            let expectedTime = data.time + ((Date.now() - data.ts) / 1000);
                            if (Math.abs(localVid.currentTime - expectedTime) > 2) {
                                localVid.currentTime = expectedTime;
                            }
                        } else {
                            localVid.pause();
                        }
                    }
                }
            }
        };

        function syncVisitorPlayer(player, data) {
            const currentUrl = player.getVideoData().video_id;
            if (currentUrl !== data.url) {
                player.loadVideoById(data.url, data.time);
            }

            if(data.volume !== undefined && player.setVolume) {
                if(data.volume == 0) {
                    player.mute();
                } else {
                    player.unMute();
                    player.setVolume(data.volume);
                }
            }

            if (data.state === 'playing') {
                player.playVideo();
                let expectedTime = data.time + ((Date.now() - data.ts) / 1000);
                const diff = Math.abs(player.getCurrentTime() - expectedTime);
                if (diff > 4) {
                    player.seekTo(expectedTime, true); 
                }
            } else if (data.state === 'paused') {
                player.pauseVideo();
            }
        }

        // مراقبة جميع الطلبات لمعرفة إذا في ضيف على الهواء وتغيير العنوان
        onValue(ref(db, 'liveData/requests'), snap => {
            const data = snap.val();
            let guestName = null;
            if(data) {
                Object.values(data).forEach(req => {
                    if(req.status === 'approved') {
                        guestName = req.name;
                    }
                });
            }
            const titleEl = document.getElementById('liveRoomTitle');
            if(titleEl) {
                if(guestName) {
                    titleEl.innerHTML = `<i class="fas fa-broadcast-tower" style="color: var(--danger);"></i> أبو فايز & ${guestName}`;
                } else {
                    titleEl.innerHTML = `<i class="fas fa-broadcast-tower" style="color: var(--danger);"></i> أبو فايز`;
                }
            }
        });

    </script>
</body>
</html>
