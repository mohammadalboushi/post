<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Al-Boushi</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f7f6f2;
            --surface: #ffffff;
            --surface-alt: #f0ede8;
            --ink: #1a1714;
            --ink-muted: #7a756e;
            --ink-faint: #c4bfb8;
            --accent: #e8501a;
            --accent-light: #fef0eb;
            --accent-muted: #f5c4b2;
            --pinned: #1a6beb;
            --pinned-light: #eaf1fd;
            --border: rgba(0,0,0,0.07);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.06), 0 12px 32px rgba(0,0,0,0.06);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.08), 0 24px 64px rgba(0,0,0,0.1);
            --radius: 18px;
            --radius-sm: 10px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 clamp(16px, 5vw, 80px);
            background: rgba(247, 246, 242, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: 820px;
            margin: 0 auto;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .wordmark {
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wordmark-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.7; }
        }

        .post-count-badge {
            font-size: 0.75rem;
            color: var(--ink-muted);
            background: var(--surface-alt);
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 600;
        }

        .hero {
            padding: clamp(40px, 8vw, 80px) clamp(16px, 5vw, 80px) clamp(20px, 4vw, 40px);
            max-width: 820px;
            margin: 0 auto;
            animation: fade-up 0.6s ease both;
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .hero h1 {
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.03em;
            color: var(--ink);
        }

        .hero h1 em {
            font-style: normal;
            color: var(--accent);
            position: relative;
        }

        .hero-sub {
            margin-top: 16px;
            font-size: 1rem;
            color: var(--ink-muted);
            font-weight: 400;
            line-height: 1.6;
        }

        /* تنسيقات مربع البحث */
        .search-container {
            margin: 25px auto 0;
            max-width: 600px;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 14px 45px 14px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--ink);
            font-family: inherit;
            font-size: 1rem;
            box-shadow: var(--shadow-sm);
            outline: none;
            transition: 0.2s;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--ink-muted);
        }
        mark {
            background-color: #ffeb3b;
            color: #000;
            padding: 0 3px;
            border-radius: 4px;
            font-weight: bold;
        }

        #posts-container {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 clamp(16px, 5vw, 80px) 80px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .post-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            animation: card-in 0.5s ease both;
            cursor: default;
        }

        @keyframes card-in {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .post-card.pinned {
            border-color: transparent;
            background: var(--surface);
            box-shadow: 0 0 0 2px var(--pinned), var(--shadow-md);
        }

        .post-card.pinned .card-top-stripe {
            background: var(--pinned);
        }

        .card-top-stripe {
            height: 3px;
            background: transparent;
            transition: background 0.3s;
        }

        .post-card:hover .card-top-stripe {
            background: var(--accent-muted);
        }

        .post-card.pinned:hover .card-top-stripe {
            background: var(--pinned);
        }

        .card-body { padding: 24px 28px 20px; }

        .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            gap: 12px;
        }

        .meta-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pin-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--pinned-light);
            color: var(--pinned);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            padding: 4px 10px;
            border-radius: 50px;
        }

        .post-date-tag {
            font-size: 0.75rem;
            color: var(--ink-faint);
            font-weight: 600;
        }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--surface-alt);
            color: var(--ink-muted);
            border: none;
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .copy-btn.copied {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .copy-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

        .post-title {
            font-size: 1.15rem;
            font-weight: 900;
            color: var(--ink);
            line-height: 1.35;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        .post-content {
            font-size: 0.97rem;
            line-height: 1.85;
            color: #4a4540;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .post-content a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid var(--accent-muted);
            transition: border-color 0.2s;
        }

        .post-content a:hover {
            border-bottom-color: var(--accent);
        }

        .read-more-btn {
            background: transparent;
            color: var(--accent);
            border: none;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            padding: 0;
            margin-top: 8px;
            font-size: 0.9rem;
            display: inline-block;
        }
        .read-more-btn:hover { text-decoration: underline; }
        .full-text { display: none; }
        .short-text { display: inline; }

        .card-footer {
            border-top: 1px solid var(--border);
            padding: 12px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .read-time, .word-count {
            font-size: 0.72rem;
            color: var(--ink-faint);
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--ink-muted);
            animation: fade-up 0.5s ease;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .loading-feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .skeleton-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 28px;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }

        .skeleton-line {
            background: var(--surface-alt);
            border-radius: 6px;
            height: 14px;
            margin-bottom: 12px;
        }

        @keyframes skeleton-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--ink);
            color: white;
            padding: 12px 22px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            z-index: 9998;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast .toast-dot {
            width: 7px;
            height: 7px;
            background: #4ade80;
            border-radius: 50%;
        }

        footer {
            text-align: center;
            padding: 24px;
            font-size: 0.75rem;
            color: var(--ink-faint);
            border-top: 1px solid var(--border);
        }

        @media (max-width: 600px) {
            .hero h1 { font-size: 1.9rem; }
            .card-body { padding: 18px 18px 14px; }
            .card-footer { padding: 10px 18px; }
        }

        /* تنسيقات نافذة التنزيل */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9999; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
        .modal-box { background:var(--surface); padding:25px; border-radius:15px; width:90%; max-width:320px; text-align:center; box-shadow:var(--shadow-lg); }
        .fmt-btn { background: var(--surface-alt); border: 2px solid transparent; padding: 12px; border-radius: 12px; color: var(--ink-muted); font-family: inherit; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.85rem;}
        .fmt-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
        .custom-input { width:100%; padding:12px; margin-bottom:12px; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--ink); font-family:inherit; outline:none; text-align: center; font-weight: bold;}
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="wordmark">
                <div class="wordmark-dot"></div>
M-Al-Boushi
            </div>
            <div class="post-count-badge" id="postCountBadge">جاري التحميل...</div>
        </div>
    </header>

    <div class="hero">
        <div class="hero-label">
            <i class="fas fa-bolt" style="font-size:0.7rem;"></i>
            آخر المنشورات
        </div>
        <h1>الأخبار<br><em>والمقالات</em></h1>
        <p class="hero-sub">كل ما يستحق القراءة، في مكان واحد.</p>
        
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن كلمة بالمنشورات...">
        </div>
    </div>

    <div id="posts-container">
        <div class="loading-feed">
            <div class="skeleton-card">
                <div class="skeleton-line" style="width:30%; height:10px; margin-bottom:20px;"></div>
                <div class="skeleton-line" style="width:70%; height:18px;"></div>
                <div class="skeleton-line" style="width:55%; height:18px;"></div>
                <div class="skeleton-line" style="width:90%; height:12px; margin-top:8px;"></div>
                <div class="skeleton-line" style="width:75%; height:12px;"></div>
            </div>
            <div class="skeleton-card" style="animation-delay:0.2s">
                <div class="skeleton-line" style="width:40%; height:10px; margin-bottom:20px;"></div>
                <div class="skeleton-line" style="width:80%; height:18px;"></div>
                <div class="skeleton-line" style="width:95%; height:12px; margin-top:8px;"></div>
                <div class="skeleton-line" style="width:60%; height:12px;"></div>
            </div>
        </div>
    </div>

    <footer>
        صُنع بعناية ← منشوراتي
    </footer>

    <div id="downloadModal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="margin-bottom:15px; font-weight:900;">تنزيل كملف</h3>
            
            <input type="text" id="fileNameInput" class="custom-input" placeholder="اسم الملف...">

            <div id="formatGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                <button class="fmt-btn active" data-fmt="txt">نص (.txt)</button>
                <button class="fmt-btn" data-fmt="doc">وورد (.doc)</button>
                <button class="fmt-btn" data-fmt="md">ماركداون (.md)</button>
                <button class="fmt-btn" data-fmt="html">ويب (.html)</button>
                <button class="fmt-btn" data-fmt="custom" style="grid-column: span 2;">صيغة أخرى...</button>
            </div>
            
            <input type="text" id="customFormatInput" class="custom-input" placeholder="اكتب الصيغة هنا (مثال: pdf, json)" style="display:none;">
            
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="confirmDownload()" style="flex:1; background:var(--accent); color:white; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">⬇️ تنزيل</button>
                <button onclick="closeDownloadModal()" style="flex:1; background:var(--surface-alt); border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer; color:var(--ink-muted);">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="toast"><span class="toast-dot"></span> <span id="toast-msg"></span></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBB_U4C880PW4GxZd8FALv8yBSiP2mNeBY",
            authDomain: "malaboushi.firebaseapp.com",
            databaseURL: "https://malaboushi-default-rtdb.firebaseio.com/",
            projectId: "malaboushi",
            storageBucket: "malaboushi.firebasestorage.app",
            messagingSenderId: "110336819350",
            appId: "1:110336819350:web:2b1b0488e72b811f0602b7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const container = document.getElementById('posts-container');
        
        window.allPostsArray = [];
        let allFetchedPosts = [];
        let postToDownload = null;
        let selectedFormat = 'txt';

        // تفعيل الأزرار وتغيير اللون عند الضغط بداخل نافذة التنزيل
        document.addEventListener('click', function(e) {
            if(e.target.classList.contains('fmt-btn')) {
                document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                selectedFormat = e.target.getAttribute('data-fmt');
                document.getElementById('customFormatInput').style.display = selectedFormat === 'custom' ? 'block' : 'none';
                if(selectedFormat === 'custom') document.getElementById('customFormatInput').focus();
            }
        });

        window.openDownloadModal = (id) => {
            postToDownload = window.allPostsArray.find(p => p.id === id);
            if(!postToDownload) return;
            
            document.getElementById('fileNameInput').value = postToDownload.title || 'Untitled_Post';
            
            document.getElementById('downloadModal').style.display = 'flex';
            selectedFormat = 'txt';
            document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.fmt-btn[data-fmt="txt"]').classList.add('active');
            document.getElementById('customFormatInput').style.display = 'none';
            document.getElementById('customFormatInput').value = '';
        };

        window.closeDownloadModal = () => {
            document.getElementById('downloadModal').style.display = 'none';
            postToDownload = null;
        };

                window.confirmDownload = () => {
            if(!postToDownload) return;
            let fmt = selectedFormat;
            if(fmt === 'custom') fmt = document.getElementById('customFormatInput').value.trim() || 'txt';
            fmt = fmt.replace('.', ''); // تنظيف الصيغة

            // التعديل الأول: الاسم الافتراضي صار بالإنكليزي
            let fileName = document.getElementById('fileNameInput').value.trim() || 'Post';
            let ctx = postToDownload.content;
            let mimeType = 'text/plain;charset=utf-8'; // الافتراضي
            
            if(fmt === 'html') {
                // نفحص إذا كان المنشور أصلاً عبارة عن كود HTML كامل
                let isHTML = ctx.trim().toLowerCase().startsWith('<!doctype') || ctx.trim().toLowerCase().startsWith('<html');
                
                // إذا لم يكن كود HTML (يعني مقال عادي)، نقوم بتغليفه
                if (!isHTML) {
                    let safeCtx = escapeHTML(ctx).replace(/\n/g, '<br>');
                    ctx = `<!DOCTYPE html>\n<html lang="ar" dir="rtl">\n<head>\n    <meta charset="utf-8">\n    <title>${fileName}</title>\n</head>\n<body style="padding:40px; line-height:1.8; font-family: 'Cairo', sans-serif; font-size: 1.1rem; color: #1a1714; background: #f7f6f2;">\n    ${safeCtx}\n</body>\n</html>`;
                }
                mimeType = 'text/html;charset=utf-8';
            } else if (fmt === 'doc') {
                let safeCtx = escapeHTML(ctx).replace(/\n/g, '<br>');
                ctx = `<html dir="rtl"><head><meta charset="utf-8"></head><body style="font-family: Arial, sans-serif;">${safeCtx}</body></html>`;
                mimeType = 'application/msword;charset=utf-8';
            }
            
            const blob = new Blob([ctx], { type: mimeType });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${fileName}.${fmt}`;
            a.click();
            URL.revokeObjectURL(a.href);
            closeDownloadModal();
            showToast('بدأ التنزيل...');
        };


        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        function processText(text, query) {
            let result = text;
            // هاد السطر بيمنع الفلتر من تخريب الأكواد البرمجية والـ &quot;
            const urlRegex = /(https?:\/\/[^\s<"&]+)/g;
            result = result.replace(urlRegex, url => `<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
            
            if (query) {
                const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(`(?![^<]*>)(${escapedQuery})`, 'gi');
                result = result.replace(regex, '<mark>$1</mark>');
            }
            return result;
        }

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2800);
        };

        window.copyPostText = (id, btn) => {
            const post = window.allPostsArray.find(p => p.id === id);
            if(!post) return;
            
            navigator.clipboard.writeText(post.content).then(() => {
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> تم النسخ`;
                btn.classList.add('copied');
                showToast('تم نسخ النص بنجاح');
                setTimeout(() => {
                    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> نسخ`;
                    btn.classList.remove('copied');
                }, 2000);
            });
        };

        window.toggleText = (btn) => {
            const contentDiv = btn.previousElementSibling;
            const shortText = contentDiv.querySelector('.short-text');
            const fullText = contentDiv.querySelector('.full-text');
            
            if (fullText.style.display === 'none') {
                shortText.style.display = 'none';
                fullText.style.display = 'inline';
                btn.innerText = 'عرض أقل';
            } else {
                shortText.style.display = 'inline';
                fullText.style.display = 'none';
                btn.innerText = 'قراءة المزيد...';
            }
        };

        function readTime(text) {
            const words = text.trim().split(/\s+/).length;
            const mins = Math.max(1, Math.round(words / 200));
            return `${mins} دقيقة قراءة`;
        }

        function wordCount(text) {
            return text.trim().split(/\s+/).length + ' كلمة';
        }

        function charCount(text) {
            return text.length + ' حرف';
        }

        function lineCount(text) {
            return text.split(/\r\n|\r|\n/).length + ' سطر';
        }

        function formatDate(ts) {
            const d = new Date(ts);
            return d.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        onValue(ref(db, 'posts'), (snapshot) => {
            const data = snapshot.val();

            if (!data) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p style="font-weight:700; font-size:1.1rem; margin-bottom:8px;">لا توجد منشورات بعد</p>
                        <p style="font-size:0.9rem;">ترقب! المحتوى قادم قريباً.</p>
                    </div>`;
                document.getElementById('postCountBadge').textContent = '٠ منشورات';
                return;
            }

            allFetchedPosts = Object.entries(data)
                .map(([k, v]) => ({ id: k, ...v }))
                .sort((a, b) => {
                    if (a.isPinned !== b.isPinned) return b.isPinned ? 1 : -1;
                    return (a.order || 0) - (b.order || 0);
                });

            window.allPostsArray = allFetchedPosts;
            renderPosts("");
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderPosts(e.target.value.trim());
        });

        function renderPosts(query) {
            container.innerHTML = '';
            
            let filtered = allFetchedPosts;
            if (query) {
                const q = query.toLowerCase();
                filtered = allFetchedPosts.filter(p => 
                    (p.title && p.title.toLowerCase().includes(q)) || 
                    (p.content && p.content.toLowerCase().includes(q))
                );
            }

            document.getElementById('postCountBadge').textContent = `${filtered.length} منشور`;

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p style="font-weight:700;">ما لقينا شي بيشبه "${query}"</p></div>`;
                return;
            }

            filtered.forEach((post, i) => {
                const limit = 350;
                let contentHTML = '';
                
                let cleanTitle = escapeHTML(post.title || '');
                let cleanContent = escapeHTML(post.content || '');

                if (query) {
                    const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const regex = new RegExp(`(?![^<]*>)(${escapedQuery})`, 'gi');
                    cleanTitle = cleanTitle.replace(regex, '<mark>$1</mark>');
                }

                if (cleanContent.length > limit && !query) {
                    const shortText = processText(cleanContent.substring(0, limit), query);
                    const fullText = processText(cleanContent, query);
                    contentHTML = `
                        <div class="post-content">
                            <span class="short-text">${shortText}...</span>
                            <span class="full-text">${fullText}</span>
                        </div>
                        <button class="read-more-btn" onclick="toggleText(this)">قراءة المزيد...</button>
                    `;
                } else {
                    contentHTML = `<div class="post-content">${processText(cleanContent, query)}</div>`;
                }

                const card = document.createElement('div');
                card.className = `post-card ${post.isPinned ? 'pinned' : ''}`;
                card.style.animationDelay = `${i * 0.05}s`;

                card.innerHTML = `
                    <div class="card-top-stripe"></div>
                    <div class="card-body">
                        <div class="card-meta">
                            <div class="meta-left">
                                ${post.isPinned ? `<span class="pin-chip"><i class="fas fa-thumbtack" style="font-size:0.65rem;"></i> مثبت</span>` : ''}
                                <span class="post-date-tag">${formatDate(post.timestamp)}</span>
                            </div>
                            <div style="display:flex; gap:8px;">
                                <button class="copy-btn" onclick="openDownloadModal('${post.id}')">
                                    <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2-2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                    تنزيل
                                </button>
                                <button class="copy-btn" onclick="copyPostText('${post.id}', this)">
                                    <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                    نسخ
                                </button>
                            </div>
                        </div>
                        ${cleanTitle ? `<div class="post-title">${cleanTitle}</div>` : ''}
                        ${contentHTML}
                    </div>
                    <div class="card-footer">
                        <span class="read-time"><i class="far fa-clock" style="margin-left:4px; font-size:0.7rem;"></i>${readTime(post.content)}</span>
                        <div style="display:flex; gap:12px;">
                            <span class="word-count" title="عدد السطور"><i class="fas fa-align-justify" style="margin-left:3px; font-size:0.65rem;"></i>${lineCount(post.content)}</span>
                            <span class="word-count" title="عدد الكلمات"><i class="fas fa-file-word" style="margin-left:3px; font-size:0.65rem;"></i>${wordCount(post.content)}</span>
                            <span class="word-count" title="عدد الحروف"><i class="fas fa-font" style="margin-left:3px; font-size:0.65rem;"></i>${charCount(post.content)}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            if (query) {
                setTimeout(() => {
                    const firstMark = document.querySelector('mark');
                    if (firstMark) {
                        firstMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100); 
            }
        }
    </script>
</body>
</html>
